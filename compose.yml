services:
  minecraft:
    image: itzg/minecraft-server:latest
    restart: always
    ports:
      - 25565:25565
      - 25575:25575 # RCON port
      - 2222:2222 # RCON SSH port
    volumes:
      - ${MC_DATA_DIR}:/data
      - ./minecraft/config:/config
    mem_limit: ${MEMORY}
    env_file:
      - ./.env
    environment:
      MEMORY: ${MEMORY}
      RCON_PASSWORD: ${RCON_PASSWORD}
      EULA: true